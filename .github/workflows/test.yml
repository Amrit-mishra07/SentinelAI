name: Automated Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aipcsr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/aipcsr-api/requirements.txt
        pip install pytest "httpx<0.28.0" pytest-asyncio alembic psycopg2-binary

    - name: Run API Tests
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/aipcsr
      run: |
        cd core/db-core
        PYTHONPATH=../../ alembic upgrade head
        cd ../../apps/aipcsr-api
        PYTHONPATH=../../core pytest tests/

    - name: Run Scanner Tests
      run: |
        pip install bandit semgrep
        cd core
        PYTHONPATH=../ pytest tests/
