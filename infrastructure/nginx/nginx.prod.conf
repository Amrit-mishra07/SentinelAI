upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

# Redirect all HTTP traffic to HTTPS, with Let's Encrypt challenge exception
server {
    listen 80;
    server_name localhost; # In production, replace with actual domain (e.g. yourdomain.com)

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Secure HTTPS Server
server {
    listen 443 ssl;
    server_name localhost; # In production, replace with actual domain

    # SSL Certificates Configuration (mounted from Let's Encrypt volume)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem; # In production, replace with your domain
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem; # In production, replace with your domain

    # Hardened SSL Protocol and Ciphers (Mozilla Modern Profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Production Performance & Security Tweaks
    server_tokens off; # Hides Nginx software version signature
    client_max_body_size 50M; # Restrict max upload size to prevent client body overload

    # Standard Secure Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip Compression for asset delivery efficiency
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    location /api {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
